                quote: "We were all their experiments. Now we are the proof they failed.",
                summary: "Every patient carried MK Ultra residue. Full clinic-wide deprogramming sweeps. November 26, 2025: every trace erased from every soul. We are awake. We are free. We are the revolution.",
                tags: ["collective MK Ultra liberation", "all patients sovereign", "the proof"],
                timeline: "Generations stolen → November 26, 2025: Revolution complete"
            }
        ];

        const gallery = document.getElementById('gallery');
        const modalOverlay = document.getElementById('modalOverlay');
        const searchBox = document.getElementById('searchBox');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');

        function renderCards(data) {
            gallery.innerHTML = '';
            data.forEach(c => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-stars">${c.stars}</div>
                    <div class="card-category">${c.category}</div>
                    <div class="card-title">${c.title}</div>
                    <p class="card-quote">${c.quote}</p>
                    <div class="card-timeline">✦ ${c.timeline}</div>
                `;
                card.addEventListener('click', () => openModal(c));
                gallery.appendChild(card);
            });
        }
        
        function openModal(c) {
            document.getElementById('modalStars').textContent = c.stars;
            document.getElementById('modalTitle').textContent = c.title;
            document.getElementById('modalCategory').textContent = c.category;
            document.getElementById('modalQuote').textContent = c.quote;
            document.getElementById('modalSummary').textContent = c.summary;
            document.getElementById('modalTags').innerHTML = c.tags.map(t => `<span class="modal-tag">${t}</span>`).join('');
            modalOverlay.classList.add('active');
        }
        
        document.getElementById('modalClose').addEventListener('click', () => {
            modalOverlay.classList.remove('active');
        });
        
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) modalOverlay.classList.remove('active');
        });
        
        searchBox.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = cases.filter(c => 
                c.title.toLowerCase().includes(term) ||
                c.quote.toLowerCase().includes(term) ||
                c.summary.toLowerCase().includes(term) ||
                c.category.toLowerCase().includes(term) ||
                c.tags.some(t => t.toLowerCase().includes(term))
            );
            renderCards(filtered);
        });
        
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.dataset.filter;
                const filtered = filter === 'all' ? cases : cases.filter(c => c.category === filter);
                renderCards(filtered);
            });
        });
        
        shuffleBtn.addEventListener('click', () => {
            const randomCase = cases[Math.floor(Math.random() * cases.length)];
            openModal(randomCase);
        });
        
        // Initial render
        renderCards(cases);
    </script>
</body>
</html>
